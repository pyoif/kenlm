name: Regenerate Cython Wrapper

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get latest stable Python version
        id: latest_py
        run: |
          LATEST=$(curl -s https://endoflife.date/api/python.json | jq -r '
            [.[] | select(.cycle | test("^3\\.1[0-9]+$"))]
            | sort_by(.cycle | split(".") | map(tonumber))
            | last | .cycle
          ')
          echo "version=$LATEST" >> $GITHUB_OUTPUT
          echo "latest Python 3.x = $LATEST"

      - name: Get last regenerated Python version
        id: last_ver
        run: |
          FILE=.python-cython-version
          if [ -f "$FILE" ]; then
            VER=$(cat "$FILE")
            echo "version=$VER" >> $GITHUB_OUTPUT
            echo "last regenerated for Python $VER"
          else
            echo "version=none" >> $GITHUB_OUTPUT
            echo "no previous regeneration found"
          fi

      - name: Skip if no new Python release
        if: steps.latest_py.outputs.version == steps.last_ver.outputs.version
        run: |
          echo "No new Python release since last regeneration. Skipping."
          exit 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ steps.latest_py.outputs.version }}

      - name: Install Cython
        run: pip install cython

      - name: Regenerate kenlm.cpp from kenlm.pyx
        run: |
          cd python
          cython kenlm.pyx --cplus -3 -o kenlm_new.cpp
          mv kenlm_new.cpp kenlm.cpp

      - name: Check for changes
        id: diff
        run: |
          if git diff --exit-code python/kenlm.cpp; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push regenerated wrapper
        if: steps.diff.outputs.changed == 'true'
        run: |
          PY_VER="${{ steps.latest_py.outputs.version }}"
          echo "$PY_VER" > .python-cython-version
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add python/kenlm.cpp .python-cython-version
          git commit -m "chore: regenerate kenlm.cpp with Cython for Python $PY_VER"
          git push
